    <rect x="175" y="174" width="13" height="13" rx="2" fill="#41c49d"/><text x="195" y="185">Jemné</text>
    <rect x="275" y="174" width="13" height="13" rx="2" fill="#f8e71e"/><text x="295" y="185">Přijatelné</text>
