  <text x="942" y="67" fill="#b5b5b5" font-family="Arial, sans-serif" font-size="17" text-anchor="end">V pořádku</text>
  <clipPath id="bar-clip">
    <rect x="58" y="87" width="884" height="38" rx="5"/>
  </clipPath>
  <g clip-path="url(#bar-clip)">
