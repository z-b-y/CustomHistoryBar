<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250" role="img" aria-labelledby="title description">
  <title id="title">Náhled karty Custom History Bar</title>
  <desc id="description">Tmavá karta s barevným pruhem stavů Netatmo Indexu zdraví, časovou osou a legendou.</desc>
